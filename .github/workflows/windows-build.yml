name: Windows Build

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - windows-resize

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          cache: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gstreamer
            mingw-w64-x86_64-gst-plugins-base
            mingw-w64-x86_64-gst-plugins-good
            mingw-w64-x86_64-gst-plugins-bad
            mingw-w64-x86_64-gst-plugins-ugly
            mingw-w64-x86_64-gst-libav
            mingw-w64-x86_64-libplist
            mingw-w64-x86_64-openssl
            ca-certificates
            mingw-w64-x86_64-gst-devtools

      - name: Install Bonjour runtime
        shell: pwsh
        run: |
          choco install bonjour --no-progress -y

      - name: Verify Bonjour runtime
        shell: pwsh
        run: |
          $dll = 'C:\Program Files\Bonjour\dnssd.dll'
          if (!(Test-Path $dll)) {
            Write-Error "Bonjour dnssd.dll not found at $dll"
            exit 1
          }

      - name: Create Bonjour SDK shim from mdnsresponder
        shell: msys2 {0}
        run: |
          SHIM="$(cygpath -u "$GITHUB_WORKSPACE")/ci-bonjour-sdk"
          mkdir -p "$SHIM/Lib/x64" "$SHIM/Include"

          curl -fsSL \
            "https://raw.githubusercontent.com/apple-oss-distributions/mDNSResponder/main/mDNSShared/dns_sd.h" \
            -o "$SHIM/Include/dns_sd.h"

          BONJOUR_DLL="/c/Program Files/Bonjour/dnssd.dll"
          if [ ! -f "$BONJOUR_DLL" ]; then
            echo "Bonjour DLL not found: $BONJOUR_DLL"
            exit 1
          fi

          gendef "$BONJOUR_DLL"
          dlltool -d dnssd.def -l "$SHIM/Lib/x64/dnssd.lib" -D dnssd.dll

          echo "BONJOUR_SDK_HOME=$(cygpath -w "$SHIM")" >> "$GITHUB_ENV"

      - name: Build
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPKG_CONFIG_EXECUTABLE="/mingw64/bin/pkg-config.exe"
          cmake --build build --parallel

      - name: Deploy (bundle DLLs and plugins)
        shell: msys2 {0}
        run: |
          export BUILD_DIR="$(cygpath -u "$GITHUB_WORKSPACE")/build"
          bash deploy_windows.sh

      - name: Copy Bonjour runtime DLL into package
        shell: pwsh
        run: |
          Copy-Item 'C:\Program Files\Bonjour\dnssd.dll' 'build\dnssd.dll' -Force

      - name: Patch launcher env for stable playback defaults
        shell: msys2 {0}
        run: |
          BAT="$(cygpath -u "$GITHUB_WORKSPACE")/build/uxplay.bat"
          if [ ! -f "$BAT" ]; then
            echo "uxplay.bat not found: $BAT"
            exit 1
          fi

          if ! grep -q "GST_PLUGIN_FEATURE_RANK" "$BAT"; then
            echo "set \"GST_PLUGIN_FEATURE_RANK=hlsdemux:0,nvh264dec:0,nvh265dec:0,wasapi2sink:0,wasapisink:0\"" >> "$BAT"
          fi

      - name: Validate packaged runtime files
        shell: msys2 {0}
        run: |
          BUILD_DIR="$(cygpath -u "$GITHUB_WORKSPACE")/build"
          test -f "$BUILD_DIR/uxplay.exe"
          test -f "$BUILD_DIR/uxplay.bat"
          test -f "$BUILD_DIR/ca-bundle.crt"
          test -f "$BUILD_DIR/gstreamer-1.0/libexec/gst-plugin-scanner.exe"
          test -f "$BUILD_DIR/gio/modules/libgiognutls.dll"

          DLL_COUNT=$(find "$BUILD_DIR" -maxdepth 1 -type f -name "*.dll" | wc -l)
          if [ "$DLL_COUNT" -lt 80 ]; then
            echo "Unexpectedly low DLL count: $DLL_COUNT"
            exit 1
          fi

      - name: Create ZIP archive
        shell: pwsh
        run: |
          if (Test-Path uxplay-windows.zip) { Remove-Item uxplay-windows.zip -Force }
          Compress-Archive -Path build\* -DestinationPath uxplay-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: uxplay-windows-${{ github.ref_name }}-${{ github.sha }}
          path: uxplay-windows.zip
          retention-days: 30

      - name: Publish ZIP to rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-resize-latest
          target_commitish: ${{ github.sha }}
          name: Windows Resize Latest
          body: |
            Auto-built Windows standalone package from `${{ github.ref_name }}`.
            Commit: `${{ github.sha }}`
          files: uxplay-windows.zip
          overwrite_files: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: true
          make_latest: false
